services:
  - type: web
    name: ecohabit-api
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start -w @ecohabit/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
